<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QueensGate — Infrastructure Research</title>
  <meta name="description" content="QueensGate Research — infrastructure research group." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&display=swap" rel="stylesheet">

  <style>
    :root {
      --void:      #ffffff;
      --void-2:    #eeeeec;
      --hairline:  rgba(255, 255, 255, 0.10);
      --paper:     #ededea;
      --faint:     #6b6b66;
      --accent:    #93b8b2;

      --display: "Gilda Display", Georgia, "Times New Roman", serif;
      --sans:    "Helvetica Neue", Helvetica, Arial, sans-serif;
      --mono:    ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--void);
      color: var(--paper);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    /* ---- Nav / masthead ---- */
    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #ffffff;
      padding: clamp(20px, 3.6vw, 34px) 24px clamp(22px, 3.8vw, 36px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .wordmark {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      animation: intro-rise 2.4s cubic-bezier(.22, 1, .36, 1) both;
    }
    @keyframes intro-rise {
      0%   { transform: translateY(calc(50vh - 90px)); }
      42%  { transform: translateY(calc(50vh - 90px)); } /* brief hold, centered */
      100% { transform: translateY(0); }
    }
    .logo {
      font-family: var(--display);
      font-weight: 400;
      font-size: clamp(2.25rem, 3.472vw, 3.75rem); /* = 60px at a 1728px (16" MacBook) viewport */
      line-height: 1;
      color: #0a0a0a;
    }
    .tagline {
      margin-top: -0.1em;
      font-family: var(--sans);
      font-weight: 300;
      font-size: clamp(0.8rem, 1.02vw, 1.1rem); /* ~ 18px at a 1728px (16" MacBook) viewport */
      letter-spacing: -0.02em;
      color: #0a0a0a;
    }

    /* ---- Grid ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 2px;
      background: var(--void);
      padding: 2px;
      opacity: 0;
      animation: content-reveal .9s ease 1.9s forwards;
    }
    @keyframes content-reveal {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .wordmark { animation: none; }
      .grid { animation: none; opacity: 1; }
    }
    .tile {
      position: relative;
      display: block;
      overflow: hidden;
      grid-column: span 6;
      aspect-ratio: 5 / 4;
      background: var(--void-2);
      cursor: pointer;
    }
    .tile.row2  { grid-column: span 4; aspect-ratio: 3 / 2; }
    .tile.soon  { cursor: default; }

    .tile-bg {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      transform: scale(1);
      transition: transform .6s cubic-bezier(.22, 1, .36, 1), filter .6s ease;
    }
    .tile:not(.soon):hover .tile-bg { transform: scale(1.035); filter: brightness(1.06); }
    .tile.soon .tile-bg { filter: grayscale(1) brightness(0.9); }

    /* Ariadne tile — fallback fill until a thumbnail is dropped in, see README note. */
    .tile.ariadne .tile-bg {
      background-color: #0c1a1c;
      background-image: url("/assets/thumbnails/ariadne.jpeg");
    }

    /* Hephaestus tile — generated fallback (rare-earth index family). Forge-lit
       gradient echoing the magnet-amber + supply-chain-teal series accents. */
    .tile.hephaestus .tile-bg {
      background-color: #14100c;
      background-image:
        radial-gradient(120% 90% at 82% 12%, rgba(197,135,31,0.30), transparent 55%),
        radial-gradient(90% 80% at 12% 96%, rgba(47,154,134,0.22), transparent 60%),
        linear-gradient(180deg, #17130e, #100d0b);
    }

    .tile-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: clamp(20px, 4vw, 48px);
      padding-right: clamp(20px, 4vw, 48px);
    }
    .tile-copy { display: flex; flex-direction: column; gap: 8px; }
    .tile-cat {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: rgba(237, 237, 234, 0.62);
    }
    .tile-title {
      font-family: var(--sans);
      font-weight: 500;
      font-size: clamp(1.35rem, 2.4vw, 2.1rem);
      letter-spacing: -0.01em;
      color: var(--paper);
      transition: color .3s ease;
    }
    .tile:not(.soon):hover .tile-title { color: var(--accent); }
    .tile.soon .tile-cat { color: var(--faint); }

    /* Corner registration ticks — same instrument mark as the Ariadne map itself. */
    .tick {
      position: absolute;
      width: 15px; height: 15px;
      border: 0 solid var(--accent);
      opacity: 0;
      transition: opacity .3s ease;
    }
    .tile:not(.soon):hover .tick { opacity: 0.85; }
    .tick.tl { top: 12px; left: 12px; border-top-width: 1px; border-left-width: 1px; }
    .tick.tr { top: 12px; right: 12px; border-top-width: 1px; border-right-width: 1px; }
    .tick.bl { bottom: 12px; left: 12px; border-bottom-width: 1px; border-left-width: 1px; }
    .tick.br { bottom: 12px; right: 12px; border-bottom-width: 1px; border-right-width: 1px; }

    @media (max-width: 760px) {
      .tile, .tile.row2 { grid-column: span 12; aspect-ratio: 4 / 3; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="wordmark" href="/" aria-label="QueensGate — home">
      <span class="logo">QueensGate</span>
      <span class="tagline">Infrastructure Research</span>
    </a>
  </header>

  <main class="grid">
    <a class="tile ariadne" href="/projects/ariadne">
      <div class="tile-bg"></div>
      <span class="tick tl"></span><span class="tick tr"></span>
      <span class="tick bl"></span><span class="tick br"></span>
      <div class="tile-overlay">
        <div class="tile-copy">
          <span class="tile-cat">Maritime Intelligence</span>
          <span class="tile-title">Ariadne</span>
        </div>
      </div>
    </a>

    <a class="tile hephaestus" href="/projects/hephaestus">
      <div class="tile-bg"></div>
      <span class="tick tl"></span><span class="tick tr"></span>
      <span class="tick bl"></span><span class="tick br"></span>
      <div class="tile-overlay">
        <div class="tile-copy">
          <span class="tile-cat">Critical Minerals</span>
          <span class="tile-title">Hephaestus</span>
        </div>
      </div>
    </a>

    <div class="tile soon row2">
      <div class="tile-bg"></div>
      <div class="tile-overlay">
        <div class="tile-copy">
          <span class="tile-cat">Coming soon</span>
        </div>
      </div>
    </div>
    <div class="tile soon row2">
      <div class="tile-bg"></div>
      <div class="tile-overlay">
        <div class="tile-copy">
          <span class="tile-cat">Coming soon</span>
        </div>
      </div>
    </div>
    <div class="tile soon row2">
      <div class="tile-bg"></div>
      <div class="tile-overlay">
        <div class="tile-copy">
          <span class="tile-cat">Coming soon</span>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
